version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ai_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aishowcase
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ai_fastapi_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Maps local files to container for live reload
    environment:
      # These override the .env file when using Docker Compose
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aishowcase
      - POSTGRES_HOST=db  
      - POSTGRES_PORT=5432
      - SECRET_KEY=your_super_secret_jwt_key_here_12345
      - ALGORITHM=HS256
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: ai_celery_worker
    command: celery -A app.worker.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aishowcase
      - POSTGRES_HOST=db
      - OPENAI_API_KEY=your_key_here
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data: