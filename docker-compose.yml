version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: ai_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aishowcase
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: ai_fastapi_web
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./uploads:/app/uploads 
    env_file:
      - .env  # <--- Automatically pulls all variables from your .env file
    environment:
      - POSTGRES_HOST=db  
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: ai_celery_worker
    volumes:
      - .:/app
      - ./uploads:/app/uploads 
    env_file:
      - .env  # <--- CRITICAL: This allows the worker to see your REAL OpenAI Key
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A app.worker.celery_app worker --loglevel=info

  beat:
    build: .
    container_name: ai_celery_beat
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.worker.celery_app beat --loglevel=info

volumes:
  postgres_data: